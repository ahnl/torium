name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build and push Docker image (Python MCP server) ───────────────────
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/ahnl/torium:latest
          build-args: GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp

      # ── Build and push Docker image (Astro web frontend) ──────────────────
      - uses: docker/build-push-action@v5
        with:
          context: web
          file: web/Dockerfile
          push: true
          platforms: linux/arm64
          tags: ghcr.io/ahnl/torium-web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
